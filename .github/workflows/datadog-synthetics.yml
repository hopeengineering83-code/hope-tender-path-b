# This workflow triggers Datadog Synthetic tests when Datadog credentials are configured.
# Required repository secrets: DD_API_KEY and DD_APP_KEY.

name: Run Datadog Synthetic tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DD_API_KEY: ${{ secrets.DD_API_KEY }}
      DD_APP_KEY: ${{ secrets.DD_APP_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Skip Datadog Synthetic tests when secrets are not configured
        if: ${{ env.DD_API_KEY == '' || env.DD_APP_KEY == '' }}
        run: echo "Datadog secrets are not configured; skipping synthetic tests."

      - name: Run Datadog Synthetic tests
        if: ${{ env.DD_API_KEY != '' && env.DD_APP_KEY != '' }}
        uses: DataDog/synthetics-ci-github-action@87b505388a22005bb8013481e3f73a367b9a53eb # v1.4.0
        with:
          api_key: ${{ env.DD_API_KEY }}
          app_key: ${{ env.DD_APP_KEY }}
          test_search_query: "tag:e2e-tests"
